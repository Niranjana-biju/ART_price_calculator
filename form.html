<!DOCTYPE html>
<html>
<head>
    <title>Art Pricing Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:black;
            color:white;
            /*font-family: 'Playfair Display', serif;*/
            font-family: Arial, sans-serif;
            cursor: url('cursor.png') 0 0, auto;
            overflow-x:hidden;
            padding-top:80px;
        }

        /* ===== Stars ===== */
        .stars{
            position:fixed;
            width:100%;
            height:100%;
            z-index:-1;
            pointer-events:none;
        }

        .stars span{
            position:absolute;
            border-radius:50%;
            background:white;
            opacity:0.8;
            animation: twinkle 3s infinite ease-in-out;
        }

        .small{ width:2px; height:2px; }
        .medium{ width:4px; height:4px; }
        .big{ width:6px; height:6px; }

        @keyframes twinkle{
            0%,100%{opacity:0.3;}
            50%{opacity:1;}
        }

        /* ===== Navbar ===== */
        .navbar{
            position:fixed;
            top:0;
            width:100%;
            background:black;
            padding:12px 0;
            text-align:center;
            z-index:1000;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        form{
            width:400px;
            margin:auto;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:6px;
            border:none;
        }

        button{
            width:100%;
            padding:12px;
            font-size:16px;
            border:none;
            border-radius:6px;
            background:white;
            color:black;
            cursor:pointer;
        }

        .file-btn{
            display:block;
            text-align:center;
            padding:10px;
            background:white;
            color:black;
            border-radius:6px;
            margin-bottom:10px;
            cursor:pointer;
        }

        #file-name{
            display:block;
            margin-bottom:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="stars">
    <span class="small" style="top:5%; left:10%;"></span>
    <span class="medium" style="top:12%; left:80%;"></span>
    <span class="small" style="top:30%; left:5%;"></span>
    <span class="big" style="top:70%; left:90%;"></span>
    <span class="medium" style="top:85%; left:15%;"></span>
    <span class="small" style="top:40%; left:95%;"></span>
    <span class="big" style="top:60%; left:2%;"></span>
    <span class="medium" style="top:90%; left:60%;"></span>
    <span class="small" style="top:15%; left:50%;"></span>
</div>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="form.html">Add Artwork</a>
    <a href="history.php">Gallery</a>
</div>

<h2>Art Pricing Calculator</h2>

<form action="calculate.php" method="post" enctype="multipart/form-data">

    <input type="file" id="art_image" name="art_image" accept="image/*" required hidden>
    <label for="art_image" class="file-btn">Choose Artwork Image</label>
    <span id="file-name"></span>

    <label>Artwork Name:</label>
    <input type="text" name="artwork_name" required>

    <label>Hours Spent:</label>
    <input type="number" step="0.1" name="hours_spent" required>

    <label>Material Cost (₹):</label>
    <input type="number" step="0.1" name="material_cost" required>

    <label>Complexity:</label>
    <select name="complexity">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <label>Experience Level:</label>
    <select name="experience_level">
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Expert</option>
    </select>

    <button type="submit">Calculate Price</button>
</form>

<script>
document.getElementById('art_image').addEventListener('change', function(){
    document.getElementById('file-name').textContent = this.files[0].name;
});
</script>

</body>
</html>
